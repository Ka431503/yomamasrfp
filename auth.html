<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yo Mama's RFP · Gmail Auth</title>
<style>
body{font-family:'IBM Plex Sans',sans-serif;background:#0f1a30;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{text-align:center;padding:40px;background:#1a2744;border-radius:12px;max-width:400px;}
.logo{font-size:24px;font-weight:700;letter-spacing:3px;margin-bottom:8px;}
.logo em{color:#c8102e;font-style:normal;}
p{color:#8a96b0;font-size:14px;margin:12px 0;}
.status{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#c9a84c;margin-top:16px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">YO MAMA<em>'S</em> · RFP</div>
  <p>Connecting Gmail...</p>
  <div class="status" id="status">Processing authorization...</div>
</div>
<script>
// Handle OAuth callback - implicit flow returns token in URL hash
const hashParams = new URLSearchParams(window.location.hash.substring(1));
const queryParams = new URLSearchParams(window.location.search);

const accessToken = hashParams.get('access_token');
const error = hashParams.get('error') || queryParams.get('error');

if(error) {
  document.getElementById('status').textContent = 'Authorization cancelled or failed.';
  setTimeout(() => { window.location.href = './rfp.html'; }, 2000);
} else if(accessToken) {
  // Store token in sessionStorage and redirect back
  sessionStorage.setItem('gmail_access_token', accessToken);
  document.getElementById('status').textContent = '✓ Gmail connected! Redirecting...';
  setTimeout(() => { window.location.href = './rfp.html?gmail_connected=1'; }, 1500);
} else {
  // Maybe token is in query params (some flows)
  const code = queryParams.get('code');
  if(code) {
    sessionStorage.setItem('gmail_auth_code', code);
    document.getElementById('status').textContent = '✓ Authorized! Redirecting...';
    setTimeout(() => { window.location.href = './rfp.html?gmail_connected=1'; }, 1500);
  } else {
    document.getElementById('status').textContent = 'No token received. Please try again.';
    setTimeout(() => { window.location.href = './rfp.html'; }, 3000);
  }
}
</script>
</body>
</html>
